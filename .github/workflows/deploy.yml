name: Daily Database Sync & Mirror

on:
  schedule:
    # Run daily at 03:00 UTC (12:00 PM JP/VN time)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # Required to commit and push changes

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node: '20'

      - name: Run Synchronization Script
        run: node sync.js
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}

      - name: Auto-commit and push updated database
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-update database and game assets [skip ci]"
          commit_user_name: "UmaDex Sync Bot"
          commit_user_email: "actions@github.com"
          file_pattern: "manifest.json data/umamusume/**/*.json images/umamusume/characters/thumb/*.png"
