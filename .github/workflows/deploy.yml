name: Daily Database Sync & Mirror

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run Synchronization Script
        run: node sync.js
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}

      - name: Auto-commit and push updated database
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: Auto-update database and game assets [skip ci]"
          commit_user_name: "UmaDex Sync Bot"
          commit_user_email: "actions@github.com"
          file_pattern: "manifest.json data/ images/"
